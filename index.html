<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0a0e17;min-height:100vh;display:flex;flex-direction:column;
  color:#e8e8e8;
}

/* ====== BG ====== */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(217,48,37,.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(255,160,0,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(26,115,232,.05) 0%, transparent 50%);
  pointer-events:none;
}

/* ====== HEADER ====== */
header{
  position:relative;z-index:1;
  background:linear-gradient(135deg,#1a0a0a 0%,#2d0f0f 40%,#1a1a1a 100%);
  border-bottom:2px solid rgba(217,48,37,.4);
  padding:14px 16px 10px;
  box-shadow:0 4px 30px rgba(217,48,37,.15);
}
header::after{
  content:'';position:absolute;bottom:-2px;left:10%;right:10%;
  height:2px;background:linear-gradient(90deg,transparent,rgba(255,160,0,.6),transparent);
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.header-brand{
  display:flex;align-items:center;gap:10px;
}
.logo-area{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,rgba(217,48,37,.3),rgba(255,138,101,.2));
  border:1.5px solid rgba(255,138,101,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.brand-text{text-align:left;}
header h1{
  font-size:17px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#f5f5f5,#ffcc80);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
header .subtitle{
  font-size:11px;color:#a08080;margin-top:2px;letter-spacing:2px;
}
.header-contact{flex-shrink:0;}
.wechat-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(7,193,96,.12);border:1px solid rgba(7,193,96,.25);
  padding:6px 14px;border-radius:20px;
  font-size:12px;color:#7bed9f;font-weight:600;
  letter-spacing:.5px;
}
.wechat-icon{font-size:14px;}
.wechat-id{color:#b8f5cd;}
header .motto{
  font-size:12px;color:#ff8a65;margin-top:8px;font-weight:700;
  letter-spacing:2px;text-align:center;
  text-shadow:0 0 20px rgba(255,138,101,.3);
}

/* ====== CONTAINER ====== */
.container{position:relative;z-index:1;flex:1;max-width:660px;margin:0 auto;width:100%;padding:16px;}

/* ====== FILTER ====== */
.filter-bar{
  background:rgba(255,255,255,.04);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;
  padding:14px 16px;margin-bottom:14px;
}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:12px;color:#a09090;font-weight:600;width:100%;margin-bottom:3px;letter-spacing:1px;}
.tag{
  display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border-radius:20px;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;user-select:none;
  border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#c0b0b0;
}
.tag:hover{border-color:#ff8a65;color:#ff8a65;background:rgba(255,138,101,.08);}
.tag.active{
  background:linear-gradient(135deg,rgba(217,48,37,.25),rgba(255,138,101,.15));
  border-color:#d93025;color:#ff8a65;box-shadow:0 0 20px rgba(217,48,37,.15);
}
.tag .count{font-size:11px;opacity:.6;}

/* ====== PROGRESS ====== */
.progress-wrap{
  height:8px;background:rgba(255,255,255,.06);border-radius:4px;
  margin-bottom:14px;overflow:hidden;position:relative;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#d93025,#ff8a65,#ffcc80);
  border-radius:4px;transition:width .5s ease;
  position:relative;
}
.progress-bar::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));
  border-radius:4px;
}

/* ====== CARD ====== */
.card{
  background:rgba(255,255,255,.04);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08);border-radius:18px;
  overflow:hidden;min-height:320px;display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.card-header{
  display:flex;align-items:center;gap:8px;padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap;
}
.badge{font-size:11px;padding:4px 12px;border-radius:10px;font-weight:700;letter-spacing:.5px;}
.badge-sub{background:rgba(26,115,232,.2);color:#8ab4f8;}
.badge-type{background:rgba(217,48,37,.2);color:#f28b82;}
.badge-chap{background:rgba(19,115,51,.2);color:#81c995;}
.badge-id{background:rgba(255,255,255,.05);color:#888;font-weight:400;}
.card-body{
  flex:1;padding:32px 22px 8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:220px;
}
.question-text{
  font-size:20px;line-height:1.8;text-align:center;color:#f0e8e0;
  max-width:100%;word-break:break-word;padding:8px 0;
  font-weight:600;
}
.empty-text{color:#807070;font-size:15px;text-align:center;line-height:1.8;}
.card-footer{
  padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
}

/* ====== BUTTONS ====== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 32px;border:none;border-radius:25px;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .25s;
  letter-spacing:1px;
}
.btn-primary{
  background:linear-gradient(135deg,#d93025,#ff6d00);
  color:#fff;box-shadow:0 4px 20px rgba(217,48,37,.3);
}
.btn-primary:hover{
  transform:translateY(-2px);box-shadow:0 6px 28px rgba(217,48,37,.45);
}
.btn-primary:active{transform:translateY(0);}
.btn-outline{
  background:rgba(255,255,255,.04);color:#b0a0a0;
  border:1.5px solid rgba(255,255,255,.1);
}
.btn-outline:hover{
  border-color:#ff8a65;color:#ff8a65;background:rgba(255,138,101,.08);
}

/* ====== STATS ====== */
.stats-bar{
  display:flex;justify-content:space-between;padding:14px 4px 6px;
  font-size:12px;color:#706060;letter-spacing:.5px;
}
.stats-bar strong{color:#e0d0c0;}
.stats-bar .highlight{color:#ff8a65;}

/* ====== FOOTER ====== */
.footer-note{
  text-align:center;font-size:11px;color:#504040;padding:8px 0 16px;
  letter-spacing:1px;
}

.fade-in{animation:fadeIn .4s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .question-text{font-size:18px;}
  .card-body{padding:24px 16px 8px;}
  .filter-bar{padding:10px 12px;}
  header h1{font-size:19px;}
  .tag{font-size:12px;padding:5px 12px;}
  .btn{padding:10px 24px;font-size:14px;}
}
</style>

  {id:652, sub:"运动生理学", type:"名词解释", chap:"", q:"绝对不应期:紧接兴奋之后，出现一个非常短暂的绝对不应期，兴奋性水平降低到零。此 时无论给予刺激的强度多大，都不能引起第二次兴奋。从时间关系来说，锋电位相当于细胞 的绝对不应期。"},

  {id:659, sub:"运动生理学", type:"名词解释", chap:"", q:"24.时值:是指以2 倍基强度刺激组织，刚能引起组织兴奋所需的最短作用时间。时值越小，神经肌肉兴奋性越高，反 之就越低。时值是评价阈强度的常用指标。"},

  }
  document.getElementById('count-dati').textContent = dati;
  document.getElementById('count-mingci').textContent = mingci;
}

function updateStats() {
  const pool = getFiltered();
  const active = getActivePool();
  const mastered = pool.length - active.length;
  const forgot = forgotIds.size;
  const remaining = active.length;
  
  document.getElementById('masteredCount').textContent = mastered;
  document.getElementById('forgotCount').textContent = forgot;
  document.getElementById('remainCount').textContent = remaining;
  document.getElementById('totalCount').textContent = pool.length;
  
  const pct = pool.length > 0 ? (mastered / pool.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct.toFixed(1) + '%';
  
  // Update footer buttons
  if (active.length === 0 && pool.length > 0) {
    document.getElementById('cardBody').innerHTML = '<div class="completion"><span class="icon">🏆</span>太强了！全部已掌握！<br><span style="font-size:15px;color:#e0d0c0;">换个科目继续刷，或重置进度</span></div>';
    document.getElementById('cardFooter').innerHTML = '<button class="btn btn-outline" onclick="clearAll()">🔄 重置进度</button>';
  }
}

// ====== ACTIONS ======
function pickQuestion() {
  const active = getActivePool();
  if (active.length === 0) {
    currentQuestion = null;
    answerVisible = false;
    updateStats();
    return;
  }
  const idx = Math.floor(Math.random() * active.length);
  currentQuestion = active[idx];
  answerVisible = false;
  renderQuestion();
  updateStats();
}

function renderQuestion() {
  if (!currentQuestion) {
    document.getElementById('cardBody').innerHTML = '<div class="empty-text">点击下方按钮开始刷题 💪</div>';
    document.getElementById('cardFooter').innerHTML = `
      <button class="btn btn-know" id="btnKnow" onclick="handleKnow()">👀 认识</button>
      <button class="btn btn-forget" id="btnForget" onclick="handleForget()">📖 忘记</button>
    `;
    document.getElementById('badgeSub').textContent = '-';
    document.getElementById('badgeType').textContent = '-';
    document.getElementById('badgeChap').textContent = '-';
    document.getElementById('badgeId').textContent = '#0';
    return;
  }
  
  const q = currentQuestion;
  // Badges
  document.getElementById('badgeSub').textContent = q.sub;
  const c = subColors[q.sub] || '#888';
  document.getElementById('badgeSub').style.background = c + '22';
  document.getElementById('badgeSub').style.color = c;
  document.getElementById('badgeType').textContent = q.type;
  document.getElementById('badgeChap').textContent = q.chap || '通用';
  document.getElementById('badgeId').textContent = '#' + q.id;
  
  // Question text
  let displayQ = q.q;
  // Clean up名词解释: remove inline definition if exists
  if (q.type === '名词解释') {
    const colonIdx = Math.max(displayQ.indexOf('：'), displayQ.indexOf(':'));
    if (colonIdx > 0) {
      const before = displayQ.substring(0, colonIdx);
      if (before.length <= 20) {
        displayQ = before.replace(/^[\d.]+\s*/, '');
      }
    }
  }
  
  const answer = getAnswer(q);
  const answerHTML = answer 
    ? `<div class="answer-wrap" id="answerWrap"><div class="answer-box"><div class="answer-label">📖 参考答案</div>${answer}</div></div>`
    : `<div class="answer-wrap" id="answerWrap"><div class="answer-box"><div class="answer-label">📝 答案待补充</div><div class="answer-empty">请对照教材复习该知识点<br>整理好答案后可补充到题库中</div></div></div>`;
  
  document.getElementById('cardBody').innerHTML = `
    <div class="question-text fade-in">${displayQ}</div>
    ${answerHTML}
  `;
  
  // Footer buttons
  document.getElementById('cardFooter').innerHTML = `
    <button class="btn btn-know" id="btnKnow" onclick="handleKnow()">👀 认识</button>
    <button class="btn btn-forget" id="btnForget" onclick="handleForget()">📖 忘记</button>
  `;
}

function handleKnow() {
  if (!currentQuestion) { pickQuestion(); return; }
  masteredIds.add(currentQuestion.id);
  forgotIds.delete(currentQuestion.id);
  saveState();
  // Animate
  document.getElementById('card').classList.remove('fade-in');
  void document.getElementById('card').offsetWidth;
  document.getElementById('card').classList.add('fade-in');
  currentQuestion = null;
  pickQuestion();
}

function handleForget() {
  if (!currentQuestion) { pickQuestion(); return; }
  if (!answerVisible) {
    // Reveal answer
    answerVisible = true;
    forgotIds.add(currentQuestion.id);
    const wrap = document.getElementById('answerWrap');
    if (wrap) wrap.classList.add('show');
    // Change buttons
    document.getElementById('cardFooter').innerHTML = `
      <button class="btn btn-primary" onclick="handleNext()">➡️ 下一题</button>
    `;
    saveState();
    updateStats();
  }
}

function handleNext() {
  if (!currentQuestion) { pickQuestion(); return; }
  currentQuestion = null;
  answerVisible = false;
  pickQuestion();
}

function clearAll() {
  if (!confirm('确定重置所有学习进度吗？')) return;
  masteredIds.clear();
  forgotIds.clear();
  localStorage.removeItem('quizMastered');
  localStorage.removeItem('quizForgot');
  currentQuestion = null;
  answerVisible = false;
  document.getElementById('cardBody').innerHTML = '<div class="empty-text">进度已重置，重新起跑 🏃<br><br><span style="font-size:13px;color:#908070;">🟢 认识 = 已会，跳过 ｜ 🟠 忘记 = 显示答案，回顾</span></div>';
  document.getElementById('cardFooter').innerHTML = `
    <button class="btn btn-know" onclick="handleKnow()">👀 认识</button>
    <button class="btn btn-forget" onclick="handleForget()">📖 忘记</button>
  `;
  updateStats();
}

function saveState() {
  localStorage.setItem('quizMastered', JSON.stringify([...masteredIds]));
  localStorage.setItem('quizForgot', JSON.stringify([...forgotIds]));
}

// ====== FILTER ======
function toggleSub(el) {
  const label = el.dataset.sub;
  const full = subFull[label];
  el.classList.toggle('active');
  selectedSubjects = [...document.querySelectorAll('[data-sub].active')].map(e => subFull[e.dataset.sub]);
  if (selectedSubjects.length === 0) {
    el.classList.add('active');
    selectedSubjects = [full];
  }
  currentQuestion = null; answerVisible = false;
  countByTypes(); updateStats();
  document.getElementById('cardBody').innerHTML = '<div class="empty-text">已切换筛选，按按钮继续 💪<br><br><span style="font-size:13px;color:#908070;">🟢 认识 = 已会，跳过 ｜ 🟠 忘记 = 显示答案，回顾</span></div>';
  document.getElementById('cardFooter').innerHTML = `
    <button class="btn btn-know" onclick="handleKnow()">👀 认识</button>
    <button class="btn btn-forget" onclick="handleForget()">📖 忘记</button>
  `;
}

function toggleType(el) {
  el.classList.toggle('active');
  selectedTypes = [...document.querySelectorAll('[data-type].active')].map(e => e.dataset.type);
  if (selectedTypes.length === 0) {
    el.classList.add('active');
    selectedTypes = [el.dataset.type];
  }
  currentQuestion = null; answerVisible = false;
  countByTypes(); updateStats();
  document.getElementById('cardBody').innerHTML = '<div class="empty-text">已切换筛选，按按钮继续 💪<br><br><span style="font-size:13px;color:#908070;">🟢 认识 = 已会，跳过 ｜ 🟠 忘记 = 显示答案，回顾</span></div>';
  document.getElementById('cardFooter').innerHTML = `
    <button class="btn btn-know" onclick="handleKnow()">👀 认识</button>
    <button class="btn btn-forget" onclick="handleForget()">📖 忘记</button>
  `;
}

// ====== KEYBOARD ======
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
    e.preventDefault();
    if (answerVisible) handleNext();
    else handleKnow();
  }
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (!answerVisible) handleForget();
    else handleNext();
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (answerVisible) handleNext();
    else pickQuestion();
  }
});

// ====== INIT ======
countByTypes();
updateStats();
if (masteredIds.size > 0 || forgotIds.size > 0) {
  const pool = getFiltered();
  const mastered = pool.filter(q => masteredIds.has(q.id)).length;
  const forgot = pool.filter(q => forgotIds.has(q.id)).length;
  if (mastered + forgot > 0) {
    document.getElementById('cardBody').innerHTML = `<div class="empty-text">欢迎回来！<br>已掌握 ${mastered} 题 · 待复习 ${forgot} 题<br>继续加油 💪</div>`;
  }
}

</script>
